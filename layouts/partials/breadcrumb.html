{{ if not .IsHome }}
<nav class="breadcrumb" aria-label="{{ T "ui-breadcrumb" }}">
  <ol>
    {{ range .Ancestors.Reverse }}
      {{ if not .IsHome }}<li><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></li>{{ end }}
    {{ end }}
    <li aria-current="page">{{ .LinkTitle }}</li>
  </ol>
</nav>
{{ end }}
