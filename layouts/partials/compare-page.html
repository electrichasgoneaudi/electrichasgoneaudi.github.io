<section class="compare-page"
         data-compare-tool
         data-api-base="https://evkx.net/api/"
         data-language="{{ .Language.Lang }}"
         data-search-placeholder="{{ T "compare-search-placeholder" }}"
         data-searching-label="{{ T "compare-searching" }}"
         data-empty-label="{{ T "compare-empty" }}"
         data-error-label="{{ T "compare-error" }}"
         data-clear-label="{{ T "compare-clear" }}"
         data-ready-label="{{ T "compare-open" }}"
         data-incomplete-label="{{ T "compare-select-two" }}">
  <header class="compare-page__header">
    <div class="container">
      {{ partial "breadcrumb.html" . }}
      <div class="microlabel">{{ T "compare-microlabel" }}</div>
      <h1 class="content-page__title">{{ .Title }}</h1>
      <p class="content-page__description">{{ .Description }}</p>
    </div>
  </header>
  <div class="band band--dark">
    <div class="container">
      <div class="compare-slots" aria-label="{{ T "compare-selected-vehicles" }}">
        {{ range seq 3 }}
        <section class="compare-slot" data-compare-slot>
          <div class="microlabel">{{ T "compare-vehicle" }} {{ . }}{{ if eq . 3 }} · {{ T "compare-optional" }}{{ end }}</div>
          <div class="compare-slot__selected" data-selected-vehicle hidden>
            <strong data-selected-name></strong>
            <button type="button" class="compare-slot__clear" data-clear-selection aria-label="{{ T "compare-clear" }}">×</button>
          </div>
          <div class="compare-slot__search" data-search-control>
            <label for="compare-search-{{ . }}">{{ T "compare-find-variant" }}</label>
            <input id="compare-search-{{ . }}" type="search" autocomplete="off" placeholder="{{ T "compare-search-placeholder" }}" data-compare-search>
            <div class="compare-slot__results" data-compare-results role="listbox" hidden></div>
          </div>
        </section>
        {{ end }}
      </div>
      <div class="compare-actions">
        <div><p>{{ T "compare-explanation" }}</p><span>{{ T "compare-data-source" }}</span></div>
        <button class="btn-primary btn-primary--lg" type="button" data-open-comparison disabled>{{ T "compare-select-two" }}</button>
      </div>
    </div>
  </div>
</section>
<script type="module" src="/js/evkx-compare.js"></script>
