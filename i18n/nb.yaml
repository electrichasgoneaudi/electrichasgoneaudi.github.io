  translation: Elbil på vinteren -Intelligente funksjoner øker rekkevidde og ladeytelse

- id: frontpage-article-electromobilityinwinter-synopsis
  translation: Setevarme i stedet for en varmluftsblåser, optimalt dekktrykk, parkering i garasjen og valg av effektivitetsmodus disse og andre faktorer avgjør hvor raskt høyspentbatteriet tømmes eller ikke.
  
