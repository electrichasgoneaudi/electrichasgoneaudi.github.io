- id: frontpage-article-q8worldpremiere-title
  translation: Audi Q8 e-tron er lansert!

- id: frontpage-article-q8worldpremiere-synopsis
  translation: Audi Q8 e-tron er nå offisiell. Med forbedret rekkevidde med opptil 44 %, redusert forbruk med opptil 9 % og ny design. Lær alt om de seks variantene!

- id: frontpage-article-e7x-title
  translation: AUDI E7X er nå til salgs

- id: frontpage-article-e7x-synopsis
  translation: Kina-eksklusiv helektrisk premium SUV — 900V, 4C-lading, opptil 751 km CLTC rekkevidde. Salget er i gang i Kina første halvår 2026.

- id: frontpage-article-q4facelift2026-title
  translation: Audi Q4 e-tron facelift 2026

- id: frontpage-article-q4facelift2026-synopsis
  translation: Mer rekkevidde, raskere lading, toveis V2L og V2H, nytt digitalt interiør og andre generasjons OLED-baklykter. Q4 e-tron får sin største oppdatering noensinne.

- id: frontpage-article-audiconceptc-title
  translation: Audi Concept C verdenspremiere

- id: frontpage-article-audiconceptc-synopsis
  translation: Audi Concept C introduserer en ny designfilosofi som kombinerer klarhet, følelser og intelligent teknologi i en veiregistrert elektrisk roadster.

- id: frontpage-article-e5sportback-title
  translation: Audi E5 Sportback for Kina

- id: frontpage-article-e5sportback-synopsis
  translation: Kina-eksklusiv elektrisk fastback utviklet med SAIC, med avansert digital teknologi, skreddersydd design og neste generasjons infotainment.

- id: frontpage-article-activesphere-title
  translation: Audi activesphere concept verdenspremiere

- id: frontpage-article-activesphere-synopsis
  translation: Som den fjerde modellen i serien markerer Audi activesphere-konseptet kulminasjonen av sfære-konseptkjøretøyer frembrakt av merket med de fire ringene.

- id: frontpage-article-audiskysphereconcept-title
  translation: Audi skysphere konsept – fremtiden er vidåpen

- id: frontpage-article-audiskysphereconcept-synopsis
  translation: En spektakulær roadster med variabel akselavstand som kan transformeres mellom en sportsbil og en luksuriøs GT, og tilbyr to forskjellige kjøreopplevelser i ett revolusjonerende konsept.

- id: frontpage-article-q6wintertesting-title
  translation: Audi Q6 e-tron vintertesting

